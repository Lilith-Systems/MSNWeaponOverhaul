    stats:
      - type: "RootAccess"
        value: true
      - type: "KernelPatch"
        value: true

  MSN_Root_Access_Shell:
    displayName: "Root Access: Shell Access"
    description: "Spawns a root shell in the simulation. Tab completion enabled."
    type: "CyberdeckMod"
    slot: "Interface"
    rarity: "Legendary"
    stats:
      - type: "ShellAccess"
        value: true
      - type: "TabCompletion"
        value: true

  MSN_Root_Access_Backdoor:
    displayName: "Root Access: Persistent Backdoor"
    description: "Installs a persistent backdoor. Survives reboots. Lilith holds the key."
    type: "CyberdeckMod"
    slot: "Security"
    rarity: "Legendary"
    stats:
      - type: "Backdoor"
        value: true
      - type: "Persistence"
        value: true