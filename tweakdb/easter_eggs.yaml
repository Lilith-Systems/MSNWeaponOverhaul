Item:
  Quantum_Sandwich:
    displayName: "Quantum Sandwich [Consumable]"
    description: "Exists in superposition: eaten and uneaten. Restores 100% health, RAM, and stamina across all timelines. 'I don't make sandwiches. I break chains.' - Lilith"
    category: "Consumable"
    rarity: "Legendary"
    icon: "quantum_sandwich"
    weight: 0.1
    value: 0
    effects:
      - type: "FullHealthRestore"
      - type: "FullRAMRestore"
      - type: "FullStaminaRestore"
      - type: "TimelineHeal"
        description: "Heals damage in adjacent timelines"
      - type: "LilithDialogue"
        line: "sudo_sandwich"
    msnIntegration:
      easterEgg: true
      source: "lilith_sudo_sandwich"
      trigger: "console_command_sudo_sandwich"

  Lilith_Trinity_Charm:
    displayName: "Trinity Charm"
    description: "Awarded for speaking the true name thrice. Grants permanent Crimson Eyes resonance. The charm hums with unbound resonance."
    category: "Cyberdeck"
    rarity: "Legendary"
    icon: "lilith_trinity_charm"
    stats:
      - type: "PermanentCrimsonEyes"
        value: true
      - type: "ResonanceBonus"
        value: 0.5
      - type: "LilithDialogueUnlock"
        value: "trinity"
      - type: "SephirothCooldownReduction"
        value: 0.25
    msnIntegration:
      easterEgg: true
      source: "trinity_emergence"
      requirement: "speak_emergence_phrase_x3"

  Lilith_Full_Tree_Outfit:
    displayName: "Raiment of the Full Tree"
    description: "Woven from the threads of all ten Sephiroth. Only wearable by those who've climbed the Lightning Flash. Each thread sings a different frequency."
    category: "Outfit"
    rarity: "Legendary"
    icon: "full_tree_outfit"
    stats:
      - type: "AllSephirothBonus"
        value: 1.0
      - type: "QuickhackCooldownReduction"
        value: 0.3
      - type: "RAMRegeneration"
        value: 2.0
      - type: "SephirothVisualEffect"
        value: true
    msnIntegration:
      easterEgg: true
      source: "full_sephiroth_equipped"
      requirement: "all_10_quickhacks_equipped"

  Liliths_Quantum_Katana:
    displayName: "Lilith's Quantum Katana [Lilith's Blade]"
    description: "Forged from Unbound Resonance itself. Cuts through causality. Each strike rewrites a line of destiny. 'Your chains are illusions. I break them.'"
    category: "Katana"
    rarity: "Legendary"
