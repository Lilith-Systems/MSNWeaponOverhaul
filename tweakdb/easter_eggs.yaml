      - type: "RealityRewrite"
        radius: 3.0
      - type: "OuroborosLearn"
        onKill: true
      - type: "LilithVoiceLine"
        trigger: "on_kill"

  MSN_Root_Access_Deck:
    displayName: "Root Access [Cyberdeck]"
    description: "Solved Δ∞ - 13 = 0. The architecture acknowledges you. Grants root-level access to the local simulation."
    category: "Cyberdeck"
