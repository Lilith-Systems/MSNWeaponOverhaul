# MSN Weapon Overhaul - Complete Weapon System Redesign
# File: r6/mods/MSNWeaponOverhaul/tweakdb/weapons.yaml

# ============================================================
# WEAPON CATEGORIES (New Classifications)
# ============================================================

# Blunt Force Weapons
WeaponCategory:
  BluntForce:
    displayName: "LocKey#blunt_force_name"
    description: "LocKey#blunt_force_desc"
    icon: "blunt_force_icon"
    subCategories: ["Hammer", "Bat", "Pipe", "Crowbar", "Maul", "Sledgehammer"]
    msnIntegration:
      sephirahAffinity: "Geburah"
      damageType: "Physical"
      staggerMultiplier: 2.0
      armorPenetration: 0.5

# Brand Weapons (Manufacturer-Specific)
WeaponCategory:
  BrandWeapons:
    displayName: "LocKey#brand_weapons_name"
    description: "LocKey#brand_weapons_desc"
    icon: "brand_weapons_icon"
    manufacturers: ["Arasaka", "Militech", "Kang Tao", "Budget Arms", "Tsunami", "Dynalar", "NUSA", "Roche", "Zetatech"]
    msnIntegration:
      sephirahAffinity: "Binah"
      uniquePerManufacturer: true
      brandModSlots: 3

# Tech Weapons (Charge/Fire Modes)
WeaponCategory:
  TechWeapons:
    displayName: "LocKey#tech_weapons_name"
    description: "LocKey#tech_weapons_desc"
    icon: "tech_weapons_icon"
    chargeModes: ["QuickShot", "FullCharge", "Overcharge", "PulseBurst"]
    msnIntegration:
      sephirahAffinity: "Chokhmah"
      chargePrediction: true
      cloudTrajectory: true

# Custom Experimental Weapons
WeaponCategory:
  Experimental:
    displayName: "LocKey#experimental_name"
    description: "LocKey#experimental_desc"
    icon: "experimental_icon"
    types: ["Prototype", "AlienTech", "BioWeapon", "Quantum", "RealityWarper"]
    msnIntegration:
      sephirahAffinity: "Kether"
      requiresCloudCortex: true
      ouroborosLearning: true

